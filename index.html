    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background-color: #f8f9fa; }
        .container {
            max-width: 500px;
            margin: auto;
            border: none;
            padding: 30px;
            border-radius: 12px;
            background-color: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            position: relative;
        }

        /* Logo pinned to the top-right corner */
        .logo {
            position: absolute;
            top: 0px;
            right: 30px;
            height: 120px;
            width: auto;
        }

        /* Offset the content area below the logo */
        .content {
            margin-top: 50px;
        }

        .applicable {
            margin: -15px 0 25px 0;
            color: #555;
            font-size: 0.9rem;
        }
        .applicable strong { color: #1a237e; }

        h3 { 
			font-family: 'Segoe UI', sans-serif; /* Font family */
			margin: 0 0 25px 0; 
			color: #1a237e; 
			font-size: 1.5rem; 
		}

        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #666; font-weight: 600; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            box-sizing: border-box;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 1rem;
        }
        input:focus { outline: none; border-color: #1a237e; ring: 2px solid #e8eaf6; }

        .result-container {
            background: #e8eaf6;
            padding: 15px;
            border-radius: 6px;
            border-left: 5px solid #1a237e;
        }

        .result {
            font-family: 'Segoe UI';
            font-size: 1.2rem;
            font-weight: bold;
            color: #1a237e;
            word-break: break-all;
            min-height: 1.2em;
        }

        /* Mobile adjustments */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 20px 16px; border-radius: 10px; }
            .logo { height: 70px; right: 16px; top: 10px; }
            .content { margin-top: 60px; }
            h3 { font-size: 1.25rem; }
            .applicable { font-size: 0.85rem; }
        }

    <div class="content">
        <h3>MLC wTech, License Key Generator</h3>
        <p class="applicable">Applicable Models: <strong>MLC3000, MLC4000, MLC4100 ...</strong></p>
        <label for="inputCode">Input Code (C2)</label>
        <input type="text" id="inputCode" placeholder="Enter a code with at least 10 characters" oninput="generateKey()">
        <label>License Key (Output)</label>
        <div class="result-container">
            <div id="licenseKey" class="result">Waiting for input...</div>
        </div>
    </div>
</div>
<script>
    function generateKey() {
        const c2 = document.getElementById('inputCode').value;
        const resultDiv = document.getElementById('licenseKey');
        if (c2.length < 10) {
            resultDiv.innerText = "Code is too short.";
            resultDiv.style.color = "#999"; // Gray when the input is too short
            return;
        }
        try {
            const p1 = (c2.charCodeAt(0) + 10).toString();
            const p2 = (c2.charCodeAt(1) + 15).toString();
            const p3 = (c2.charCodeAt(3) + 13).toString();
            const p4 = (c2.charCodeAt(6) + 15).toString();
            const p5 = (c2.charCodeAt(9) + 10).toString();
            const finalKey = p1 + p2 + p3 + p4 + p5;
            resultDiv.innerText = finalKey;
            resultDiv.style.color = "#1a237e"; // Navy when a key is generated
        } catch (e) {
            resultDiv.innerText = "Error occurred";
            resultDiv.style.color = "#d32f2f"; // Red on error
        }
    }
</script>
